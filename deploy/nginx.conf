# KBID Proposal Generator — nginx reverse proxy (kbid.wetreadwell.com -> 127.0.0.1:8902).
# Install to /etc/nginx/sites-available/kbid, symlink into sites-enabled, then certbot.
server {
    listen 80;
    server_name kbid.wetreadwell.com;
    # certbot inserts the 443 server + redirect on first run.

    client_max_body_size 25M;    # room for uploaded final proposals (feedback loop)

    location / {
        proxy_pass http://127.0.0.1:8902;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;   # proposal/docx generation can be slow
    }
}
