# KBID Proposal Generator — prod stack (app + self-hosted Postgres) on the VPS.
# Image is built off-box and loaded via deploy/ship.sh; compose never uses --build here.
services:
  db:
    image: postgres:16-alpine
    container_name: kbid-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kbid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-kbid}
    volumes:
      - kbid_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kbid} -d ${POSTGRES_DB:-kbid}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: kbid-proposal-tool:latest
    container_name: kbid-proposal-tool
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      APP_ENV: prod
      FRONTEND_DIR: /app/frontend
      DATABASE_URL: postgresql://${POSTGRES_USER:-kbid}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-kbid}
      DEV_AUTH_BYPASS: "0"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8902:8902"   # nginx is the public face; app stays on localhost

volumes:
  kbid_db:
